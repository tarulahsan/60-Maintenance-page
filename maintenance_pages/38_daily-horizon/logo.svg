
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-label="Daily Horizon logo">
  <defs>
    <linearGradient id="gdaily-horizon" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff512f"/>
      <stop offset="100%" stop-color="#dd2476"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect x="20" y="20" width="160" height="160" rx="32" fill="url(#gdaily-horizon)" filter="url(#shadow)"/>
  <circle cx="160" cy="40" r="8" fill="rgba(255,255,255,0.8)"/>
  <circle cx="30" cy="170" r="6" fill="rgba(255,255,255,0.6)"/>
  <text x="100" y="120" text-anchor="middle" font-family="'Inter', system-ui" font-weight="800" font-size="68" fill="white">DH</text>
</svg>
